services:
  postgres:
    image: postgres:16-alpine
    container_name: reffinity-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: reffinity
      POSTGRES_PASSWORD: reffinity_dev
      POSTGRES_DB: reffinity
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reffinity -d reffinity"]
      interval: 10s
      timeout: 5s
      retries: 5

  hardhat:
    profiles: [local-chain]
    build:
      context: .
      dockerfile: docker/Dockerfile.hardhat
    container_name: reffinity-hardhat
    ports:
      - "8545:8545"
    healthcheck:
      test: >
        wget -qO- --post-data='{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}'
        --header='Content-Type: application/json'
        http://localhost:8545 | grep -q result
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  hardhat-deploy:
    profiles: [local-chain]
    build:
      context: .
      dockerfile: docker/Dockerfile.hardhat
    container_name: reffinity-hardhat-deploy
    depends_on:
      hardhat:
        condition: service_healthy
    command: >
      sh -c "npx hardhat run ./scripts/deploy.js --network localhost"
    environment:
      HARDHAT_NODE_URL: http://hardhat:8545
    working_dir: /app/packages/common/contracts
    restart: "no"

  db-migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: reffinity-db-migrate
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma generate && npx prisma migrate deploy && npx prisma db seed"
    environment:
      DATABASE_URL: postgresql://reffinity:reffinity_dev@postgres:5432/reffinity
    working_dir: /app/services/api
    restart: "no"

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: reffinity-api
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      hardhat:
        condition: service_healthy
      hardhat-deploy:
        condition: service_completed_successfully
      db-migrate:
        condition: service_completed_successfully
    environment:
      # --------- Reflects the .env.example in services/api. If running local change the .env file to match -----------
      # App
      NODE_ENV: production
      PORT: 3001

      # Database
      DATABASE_URL: postgresql://reffinity:reffinity_dev@postgres:5432/reffinity

      # JWT (from .env file)
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d

      # URLs
      FRONTEND_URL: http://localhost:3000
      API_URL: http://localhost:3001

      # Email
      EMAIL_PROVIDER: smtp
      FROM_EMAIL: noreply@reffinity.io
      FROM_NAME: Reffinity
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_SECURE: false
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}

      # Blockchain
      RPC_URL: http://hardhat:8545
      RPC_WEBSOCKET_URL: ws://hardhat:8545
      CHAIN_TYPE: localhost
      HARDHAT_NODE_URL: http://hardhat:8545
      HARDHAT_DEFAULT_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── 6. Web ───────────────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    container_name: reffinity-web
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000

      # API
      NEXT_PUBLIC_API_URL: http://localhost:3001/api

      # Blockchain
      NEXT_PUBLIC_CHAIN_ID: 31337
      NEXT_PUBLIC_RPC_URL: https://127.0.0.1:8545

      # Wallet Connect (if needed)
      #NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID: your_wallet_connect_project_id
    restart: unless-stopped

volumes:
  postgres_data:
